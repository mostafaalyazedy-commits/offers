<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offer Files Comparison Tool</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ============================================================
   DESIGN TOKENS
   Palette: clinical teal + slate, calm pharmacy dashboard.
   ============================================================ */
:root{
  --bg:#0f1720;          /* deep slate background */
  --panel:#16212e;       /* card surface */
  --panel-2:#1d2b3a;     /* raised surface */
  --line:#27384a;        /* hairline borders */
  --ink:#e6edf3;         /* primary text */
  --ink-dim:#9fb1c1;     /* secondary text */
  --ink-faint:#6b7d8d;   /* tertiary text */
  --teal:#2dd4bf;        /* primary accent */
  --teal-deep:#0f766e;
  --amber:#f5b942;       /* warning / different */
  --rose:#f87171;        /* missing / negative */
  --green:#34d399;       /* unified / positive */
  --blue:#60a5fa;        /* info */
  --radius:14px;
  --radius-sm:9px;
  --shadow:0 8px 30px rgba(0,0,0,.35);
  --mono:'SF Mono',ui-monospace,'Cascadia Code','Roboto Mono',Menlo,monospace;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(1200px 600px at 85% -10%, rgba(45,212,191,.08), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
h1,h2,h3{margin:0;font-weight:650;letter-spacing:-.01em}
a{color:var(--teal)}
.wrap{max-width:1320px;margin:0 auto;padding:28px 22px 80px}

/* ---------- Header ---------- */
header.app{
  display:flex;align-items:center;gap:16px;
  padding:18px 22px;margin-bottom:24px;
  background:linear-gradient(180deg,var(--panel-2),var(--panel));
  border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.logo{
  width:46px;height:46px;border-radius:12px;flex:0 0 auto;
  background:linear-gradient(135deg,var(--teal),var(--teal-deep));
  display:grid;place-items:center;color:#06201d;font-weight:800;font-size:20px;
  box-shadow:0 4px 14px rgba(45,212,191,.3);
}
header.app h1{font-size:20px}
header.app p{margin:2px 0 0;color:var(--ink-dim);font-size:12.5px}
.header-meta{margin-left:auto;text-align:right;color:var(--ink-faint);font-size:11.5px;font-family:var(--mono)}

/* ---------- Cards / sections ---------- */
.card{
  background:var(--panel);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;margin-bottom:20px;
  box-shadow:var(--shadow);
}
.card > .card-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.card-head .step{
  font-family:var(--mono);font-size:11px;color:var(--teal);
  border:1px solid var(--teal-deep);padding:2px 7px;border-radius:6px;
}
.card-head h2{font-size:15px}
.card-head .hint{margin-left:auto;color:var(--ink-faint);font-size:12px}

/* ---------- Upload ---------- */
.drop{
  border:1.5px dashed var(--line);border-radius:var(--radius);
  padding:34px 20px;text-align:center;cursor:pointer;
  transition:.18s;background:rgba(255,255,255,.012);
}
.drop:hover,.drop.drag{border-color:var(--teal);background:rgba(45,212,191,.05)}
.drop .ic{font-size:30px;margin-bottom:8px;opacity:.85}
.drop strong{color:var(--ink)}
.drop span{color:var(--ink-dim)}
.drop small{display:block;margin-top:6px;color:var(--ink-faint);font-size:11.5px}

/* ---------- File list ---------- */
.files{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.file-card{
  display:flex;align-items:center;gap:12px;
  background:var(--panel-2);border:1px solid var(--line);
  border-radius:var(--radius-sm);padding:12px 13px;position:relative;
  transition:.15s;
}
.file-card.sel{border-color:var(--teal);box-shadow:inset 0 0 0 1px var(--teal-deep)}
.file-card input[type=checkbox]{
  appearance:none;width:19px;height:19px;border:1.5px solid var(--line);
  border-radius:5px;cursor:pointer;flex:0 0 auto;position:relative;transition:.15s;
}
.file-card input[type=checkbox]:checked{background:var(--teal);border-color:var(--teal)}
.file-card input[type=checkbox]:checked::after{
  content:"✓";position:absolute;inset:0;display:grid;place-items:center;
  color:#06201d;font-size:12px;font-weight:800;
}
.file-card .fmeta{min-width:0;flex:1}
.file-card .fname{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-card .fsub{color:var(--ink-faint);font-size:11.5px;font-family:var(--mono);margin-top:1px}
.file-card .rm{
  background:none;border:none;color:var(--ink-faint);cursor:pointer;
  font-size:16px;padding:2px 4px;border-radius:5px;flex:0 0 auto;
}
.file-card .rm:hover{color:var(--rose);background:rgba(248,113,113,.12)}

/* ---------- Report type selector ---------- */
.report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:11px}
.rep-card{
  text-align:left;cursor:pointer;border:1px solid var(--line);
  background:var(--panel-2);border-radius:var(--radius-sm);padding:13px 14px;
  transition:.15s;color:var(--ink);
}
.rep-card:hover{border-color:var(--ink-faint)}
.rep-card.active{border-color:var(--teal);background:linear-gradient(180deg,rgba(45,212,191,.10),var(--panel-2));box-shadow:0 0 0 1px var(--teal-deep) inset}
.rep-card .rt{font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:8px}
.rep-card .rt .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.rep-card .rd{color:var(--ink-dim);font-size:11.5px;margin-top:5px;line-height:1.45}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:8px;
  border:1px solid var(--line);background:var(--panel-2);color:var(--ink);
  padding:10px 16px;border-radius:var(--radius-sm);cursor:pointer;
  font-size:13px;font-weight:600;font-family:var(--sans);transition:.15s;
}
.btn:hover{border-color:var(--ink-faint)}
.btn.primary{background:linear-gradient(135deg,var(--teal),var(--teal-deep));border-color:transparent;color:#06201d}
.btn.primary:hover{filter:brightness(1.07)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}

/* ---------- Results ---------- */
.result-head{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:14px}
.result-head h2{font-size:16px}
.result-head .count{
  font-family:var(--mono);font-size:12px;color:var(--teal);
  background:rgba(45,212,191,.1);border:1px solid var(--teal-deep);
  padding:3px 9px;border-radius:7px;
}
.result-head .spacer{margin-left:auto}
.search-box{
  background:var(--panel-2);border:1px solid var(--line);border-radius:8px;
  padding:8px 11px;color:var(--ink);font-size:13px;min-width:200px;font-family:var(--sans);
}
.search-box:focus{outline:none;border-color:var(--teal)}

.tbl-scroll{overflow:auto;border:1px solid var(--line);border-radius:var(--radius-sm);max-height:620px}
table{border-collapse:collapse;width:100%;font-size:12.5px}
thead th{
  position:sticky;top:0;z-index:2;background:var(--panel-2);
  text-align:left;padding:10px 12px;font-weight:650;color:var(--ink-dim);
  border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{color:var(--ink)}
thead th .arrow{opacity:.5;font-size:10px;margin-left:3px}
tbody td{padding:9px 12px;border-bottom:1px solid var(--line);vertical-align:top}
tbody tr:hover{background:rgba(255,255,255,.022)}
tbody tr:last-child td{border-bottom:none}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.muted{color:var(--ink-faint)}
.prodname{max-width:280px;color:var(--ink)}
.stocklist{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)}

/* badges */
.badge{
  display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;
  border-radius:20px;font-family:var(--mono);white-space:nowrap;
}
.b-green{background:rgba(52,211,153,.14);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.b-amber{background:rgba(245,185,66,.14);color:var(--amber);border:1px solid rgba(245,185,66,.3)}
.b-rose{background:rgba(248,113,113,.14);color:var(--rose);border:1px solid rgba(248,113,113,.3)}
.b-blue{background:rgba(96,165,250,.14);color:var(--blue);border:1px solid rgba(96,165,250,.3)}
.b-slate{background:rgba(159,177,193,.12);color:var(--ink-dim);border:1px solid var(--line)}
.perfile{display:flex;flex-direction:column;gap:3px}
.perfile .pf{display:flex;gap:6px;align-items:center;font-size:11px}
.perfile .pf .k{color:var(--ink-faint);font-family:var(--mono);min-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.perfile .pf .v{font-family:var(--mono);font-weight:600}

.empty{padding:48px 20px;text-align:center;color:var(--ink-faint)}
.empty .ic{font-size:34px;margin-bottom:8px;opacity:.6}

/* full comparison matrix offer cells */
.offcell{font-family:var(--mono);font-weight:600}
.offcell.miss{color:var(--ink-faint);font-weight:400}

/* toast */
#toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
  padding:11px 18px;border-radius:10px;box-shadow:var(--shadow);
  opacity:0;pointer-events:none;transition:.25s;font-size:13px;z-index:99;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* summary chips */
.chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:4px}
.chip{
  background:var(--panel-2);border:1px solid var(--line);border-radius:10px;
  padding:10px 14px;min-width:120px;
}
.chip .n{font-size:20px;font-weight:750;font-family:var(--mono)}
.chip .l{font-size:11px;color:var(--ink-dim);margin-top:1px}

/* RTL hint for arabic product names handled inline */
[dir-auto]{unicode-bidi:plaintext}

@media (max-width:640px){
  .wrap{padding:16px 12px 60px}
  header.app{flex-wrap:wrap}
  .header-meta{margin-left:0;text-align:left;width:100%}
  .prodname{max-width:160px}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="app">
    <div class="logo">℞</div>
    <div>
      <h1>Offer Files Comparison Tool</h1>
      <p>Compare pharmacy offer sheets across branches — unified, divergent, unique &amp; missing items.</p>
    </div>
    <div class="header-meta" id="globalMeta">No files loaded</div>
  </header>

  <!-- STEP 1: UPLOAD -->
  <section class="card">
    <div class="card-head">
      <span class="step">01</span><h2>Upload offer files</h2>
      <span class="hint">.xlsx / .xls / .csv — multiple files at once</span>
    </div>
    <label class="drop" id="drop">
      <div class="ic">⬆</div>
      <div><strong>Click to choose files</strong> <span>or drag &amp; drop here</span></div>
      <small>Reads the data sheet automatically. Original files are never modified.</small>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" multiple hidden>
    </label>
  </section>

  <!-- STEP 2: FILES + SELECTION -->
  <section class="card" id="filesCard" style="display:none">
    <div class="card-head">
      <span class="step">02</span><h2>Files &amp; selection</h2>
      <span class="hint" id="selHint"></span>
    </div>
    <div class="btn-row" style="margin-bottom:13px">
      <button class="btn" id="selAll">Select all</button>
      <button class="btn" id="selNone">Clear</button>
    </div>
    <div class="files" id="filesList"></div>
  </section>

  <!-- STEP 3: REPORT TYPE -->
  <section class="card" id="reportCard" style="display:none">
    <div class="card-head">
      <span class="step">03</span><h2>Choose a report</h2>
    </div>
    <div class="report-grid" id="reportGrid"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn primary" id="genBtn">▸ Generate report</button>
      <button class="btn" id="exportCur" disabled>⤓ Export current report</button>
      <button class="btn" id="exportAll" disabled>⤓ Export all reports</button>
    </div>
  </section>

  <!-- RESULTS -->
  <section class="card" id="resultsCard" style="display:none">
    <div class="chips" id="summaryChips"></div>
    <div class="result-head">
      <h2 id="resTitle">Results</h2>
      <span class="count" id="resCount">0 rows</span>
      <span class="spacer"></span>
      <input class="search-box" id="resSearch" placeholder="Filter rows…">
    </div>
    <div id="resBody"></div>
  </section>

</div>
<div id="toast"></div>

<script>
"use strict";
/* ============================================================
   OFFER FILES COMPARISON TOOL — single-file engine
   ------------------------------------------------------------
   Data model (per file): Map<itemKey, ItemRecord>
     ItemRecord = {
       itemNo, name, offer (canonical %), offerDist (Map %->count),
       stocks:Set, salePrices:Set, startDates:Set, endDates:Set
     }
   Comparison key  : Item No. (fallback cleaned Product Name)
   Offer value     : Offer% if present & non-zero else Result Offer
   Duplicates      : same Item No. across rows = ONE item; stock ids merged
   ============================================================ */

/* ---------- flexible header detection ---------- */
// canonical field -> list of accepted header variants (lowercased, stripped)
const HEADER_MAP = {
  itemNo:      ["item no.","item no","itemno","item number","item","code","item code"],
  productName: ["product name","product","name","description","item name"],
  stockId:     ["stock id","stockid","stock","barcode","stock_id"],
  salePrice:   ["sale price","saleprice","price","sale_price","selling price"],
  offerPct:    ["offer %","offer%","offer percent","offer percentage","offer_pct","discount %","discount%"],
  resultOffer: ["result offer","resultoffer","result","final offer","net offer","result_offer"],
  startDate:   ["start date","startdate","start","from","valid from","start_date"],
  endDate:     ["end date","enddate","end","to","valid to","end_date"],
  status:      ["status","active"],
};
function normHeader(h){ return String(h==null?"":h).trim().toLowerCase().replace(/\s+/g," "); }

// Given a header row (array), build map canonicalField -> columnIndex
function detectColumns(headerRow){
  const cols={};
  headerRow.forEach((h,i)=>{
    const n=normHeader(h);
    if(!n) return;
    for(const field in HEADER_MAP){
      if(cols[field]!=null) continue;
      if(HEADER_MAP[field].includes(n)){ cols[field]=i; }
    }
  });
  return cols;
}

/* ---------- value normalisation ---------- */
function cleanName(s){
  return String(s==null?"":s).trim().replace(/\s+/g," ").toLowerCase();
}
// Parse an offer cell into a percentage number (0-100) or null.
// Accepts 0.2 -> 20, "50%" -> 50, "50.00%" -> 50, 50 -> 50.
function parsePct(raw, asFraction){
  if(raw==null||raw==="") return null;
  if(typeof raw==="number"){
    if(asFraction){
      // Offer% column stores fractions (0.2 = 20%) but sometimes whole numbers.
      return raw>0 && raw<=1 ? round2(raw*100) : round2(raw);
    }
    return round2(raw);
  }
  let s=String(raw).trim();
  const hasPct=s.includes("%");
  s=s.replace("%","").replace(/,/g,"").trim();
  let v=parseFloat(s);
  if(isNaN(v)) return null;
  if(asFraction && !hasPct && v>0 && v<=1) v=v*100; // fraction form
  return round2(v);
}
function round2(n){ return Math.round((Number(n)+Number.EPSILON)*100)/100; }

// Canonical offer for a row: prefer Offer% (non-zero), else Result Offer.
function rowOffer(row, cols){
  const op = cols.offerPct!=null ? parsePct(row[cols.offerPct], true) : null;
  if(op!=null && op!==0) return op;
  const ro = cols.resultOffer!=null ? parsePct(row[cols.resultOffer], false) : null;
  if(ro!=null && ro!==0) return ro;
  // if both effectively 0 / blank, return whichever is non-null (could be a real 0% offer)
  if(op!=null) return op;
  if(ro!=null) return ro;
  return null;
}

/* ---------- date formatting ---------- */
function fmtDate(v){
  if(v==null||v==="") return "";
  if(v instanceof Date) return v.toISOString().slice(0,10);
  // Excel serial number
  if(typeof v==="number" && v>20000 && v<80000){
    const d=new Date(Math.round((v-25569)*86400*1000));
    if(!isNaN(d)) return d.toISOString().slice(0,10);
  }
  const d=new Date(v);
  if(!isNaN(d)) return d.toISOString().slice(0,10);
  return String(v);
}

/* ---------- state ---------- */
const STATE = {
  files: [],          // {id,name,rowCount,items:Map, cols}
  selectedReport: "unified",
  lastReport: null,   // {type,columns,rows} for export
};
let fileSeq=0;

const REPORTS = [
  {id:"unified",  name:"Unified Same Offer",       color:"var(--green)", desc:"Items present in every selected file with the same offer %."},
  {id:"common",   name:"Common Items",             color:"var(--blue)",  desc:"Items present in every selected file (offer may differ)."},
  {id:"different", name:"Common, Different Offer",  color:"var(--amber)", desc:"Items in every selected file but with differing offer %."},
  {id:"unique",   name:"Unique Items Per File",     color:"var(--teal)",  desc:"Items found in only one of the selected files."},
  {id:"missing",  name:"Missing Items",             color:"var(--rose)",  desc:"Items in some selected files but absent from others."},
  {id:"full",     name:"Full Comparison",           color:"var(--ink-dim)",desc:"Every item with its status and per-file offer matrix."},
];

/* ============================================================
   FILE PARSING
   ============================================================ */
function findHeaderRow(rows){
  // Scan first 10 rows; pick the one whose detected columns include itemNo or productName.
  for(let i=0;i<Math.min(rows.length,10);i++){
    const cols=detectColumns(rows[i]||[]);
    if(cols.itemNo!=null || cols.productName!=null){
      return {idx:i, cols};
    }
  }
  return {idx:0, cols:detectColumns(rows[0]||[])};
}

function buildItems(rows, headerIdx, cols){
  const items=new Map();
  for(let r=headerIdx+1;r<rows.length;r++){
    const row=rows[r]||[];
    if(row.every(c=>c==null||c==="")) continue;

    let itemNo = cols.itemNo!=null ? row[cols.itemNo] : null;
    const name = cols.productName!=null ? row[cols.productName] : null;

    // build comparison key
    let key, displayItemNo;
    if(itemNo!=null && String(itemNo).trim()!==""){
      key="I:"+String(itemNo).trim();
      displayItemNo=itemNo;
    } else if(name!=null && cleanName(name)!==""){
      key="N:"+cleanName(name);
      displayItemNo="";
    } else {
      continue; // no usable key
    }

    const offer=rowOffer(row, cols);

    let rec=items.get(key);
    if(!rec){
      rec={
        key, itemNo:displayItemNo, name:(name!=null?String(name).trim():""),
        offerDist:new Map(), stocks:new Set(),
        salePrices:new Set(), startDates:new Set(), endDates:new Set(),
      };
      items.set(key,rec);
    }
    if(!rec.name && name) rec.name=String(name).trim();
    if(offer!=null) rec.offerDist.set(offer,(rec.offerDist.get(offer)||0)+1);
    if(cols.stockId!=null && row[cols.stockId]!=null && row[cols.stockId]!=="")
      rec.stocks.add(String(row[cols.stockId]).trim());
    if(cols.salePrice!=null && row[cols.salePrice]!=null && row[cols.salePrice]!=="")
      rec.salePrices.add(round2(row[cols.salePrice]));
    if(cols.startDate!=null){ const d=fmtDate(row[cols.startDate]); if(d) rec.startDates.add(d); }
    if(cols.endDate!=null){ const d=fmtDate(row[cols.endDate]); if(d) rec.endDates.add(d); }
  }
  // canonical offer = most frequent offer value
  items.forEach(rec=>{
    let best=null,bestC=-1;
    rec.offerDist.forEach((c,v)=>{ if(c>bestC){bestC=c;best=v;} });
    rec.offer=best;
  });
  return items;
}

function parseWorkbook(name, data){
  const wb=XLSX.read(data,{type:"array",cellDates:true});
  // choose the sheet with the most rows (skips tiny meta sheets like "Sheet2")
  let bestSheet=null,bestRows=null,bestLen=-1;
  wb.SheetNames.forEach(sn=>{
    const arr=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:null,raw:true});
    if(arr.length>bestLen){ bestLen=arr.length; bestRows=arr; bestSheet=sn; }
  });
  const {idx,cols}=findHeaderRow(bestRows);
  const items=buildItems(bestRows,idx,cols);
  return {name, rowCount:items.size, items, cols, sheet:bestSheet};
}

/* ============================================================
   UI: file upload
   ============================================================ */
const drop=document.getElementById("drop");
const fileInput=document.getElementById("fileInput");
drop.addEventListener("click",()=>fileInput.click());
["dragover","dragenter"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.add("drag");}));
["dragleave","drop"].forEach(e=>drop.addEventListener(e,ev=>{ev.preventDefault();drop.classList.remove("drag");}));
drop.addEventListener("drop",ev=>handleFiles(ev.dataTransfer.files));
fileInput.addEventListener("change",ev=>{handleFiles(ev.target.files);fileInput.value="";});

function handleFiles(fileList){
  const arr=[...fileList];
  let done=0;
  if(!arr.length) return;
  arr.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const parsed=parseWorkbook(file.name,e.target.result);
        STATE.files.push({id:++fileSeq, name:file.name, selected:true, ...parsed});
      }catch(err){
        console.error(err); toast("Could not read "+file.name);
      }
      if(++done===arr.length){ renderFiles(); renderReports(); toast(arr.length+" file(s) loaded"); }
    };
    reader.readAsArrayBuffer(file);
  });
}

function renderFiles(){
  const card=document.getElementById("filesCard");
  const list=document.getElementById("filesList");
  if(!STATE.files.length){ card.style.display="none"; document.getElementById("reportCard").style.display="none"; document.getElementById("globalMeta").textContent="No files loaded"; return; }
  card.style.display="";
  document.getElementById("reportCard").style.display="";
  list.innerHTML="";
  STATE.files.forEach(f=>{
    const el=document.createElement("div");
    el.className="file-card"+(f.selected?" sel":"");
    el.innerHTML=`
      <input type="checkbox" ${f.selected?"checked":""} data-id="${f.id}">
      <div class="fmeta">
        <div class="fname" title="${f.name}">${f.name}</div>
        <div class="fsub">${f.rowCount} items · sheet "${f.sheet}"</div>
      </div>
      <button class="rm" data-rm="${f.id}" title="Remove">✕</button>`;
    list.appendChild(el);
  });
  list.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.addEventListener("change",()=>{
      const f=STATE.files.find(x=>x.id==cb.dataset.id);
      f.selected=cb.checked; cb.closest(".file-card").classList.toggle("sel",cb.checked);
      updateSelHint();
    });
  });
  list.querySelectorAll('[data-rm]').forEach(b=>{
    b.addEventListener("click",()=>{
      STATE.files=STATE.files.filter(x=>x.id!=b.dataset.rm);
      renderFiles(); renderReports();
    });
  });
  const totalItems=STATE.files.reduce((s,f)=>s+f.rowCount,0);
  document.getElementById("globalMeta").textContent=`${STATE.files.length} files · ${totalItems} total items`;
  updateSelHint();
}
function updateSelHint(){
  const sel=STATE.files.filter(f=>f.selected);
  document.getElementById("selHint").textContent=sel.length+" of "+STATE.files.length+" selected for comparison";
}
document.getElementById("selAll").addEventListener("click",()=>{STATE.files.forEach(f=>f.selected=true);renderFiles();});
document.getElementById("selNone").addEventListener("click",()=>{STATE.files.forEach(f=>f.selected=false);renderFiles();});

/* ============================================================
   UI: report type cards
   ============================================================ */
function renderReports(){
  const grid=document.getElementById("reportGrid");
  grid.innerHTML="";
  REPORTS.forEach(r=>{
    const el=document.createElement("div");
    el.className="rep-card"+(r.id===STATE.selectedReport?" active":"");
    el.innerHTML=`<div class="rt"><span class="dot" style="background:${r.color}"></span>${r.name}</div><div class="rd">${r.desc}</div>`;
    el.addEventListener("click",()=>{STATE.selectedReport=r.id;renderReports();});
    grid.appendChild(el);
  });
}
document.getElementById("genBtn").addEventListener("click",generate);

/* ============================================================
   COMPARISON ENGINE
   ============================================================ */
function selectedFiles(){ return STATE.files.filter(f=>f.selected); }

// union of all item keys across selected files, with name resolution
function allKeys(files){
  const map=new Map(); // key -> {itemNo,name}
  files.forEach(f=>f.items.forEach((rec,key)=>{
    if(!map.has(key)) map.set(key,{itemNo:rec.itemNo,name:rec.name});
    else if(!map.get(key).name && rec.name) map.get(key).name=rec.name;
  }));
  return map;
}
const shortName=n=>n.replace(/\.(xlsx|xls|csv)$/i,"");
function offersEqual(a,b){ return a!=null && b!=null && Math.abs(a-b)<0.001; }

function generate(){
  const files=selectedFiles();
  if(files.length<1){ toast("Select at least one file"); return; }
  if((STATE.selectedReport==="unified"||STATE.selectedReport==="common"||STATE.selectedReport==="different"||STATE.selectedReport==="missing") && files.length<2){
    toast("This report needs at least 2 selected files");
  }
  let report;
  switch(STATE.selectedReport){
    case "unified":   report=repUnified(files); break;
    case "common":    report=repCommon(files); break;
    case "different": report=repDifferent(files); break;
    case "unique":    report=repUnique(files); break;
    case "missing":   report=repMissing(files); break;
    case "full":      report=repFull(files); break;
  }
  STATE.lastReport=report;
  renderResult(report, files);
  document.getElementById("exportCur").disabled=false;
  document.getElementById("exportAll").disabled=false;
}

/* ---- 1. Unified Same Offer ---- */
function repUnified(files){
  const keys=allKeys(files);
  const rows=[];
  keys.forEach((meta,key)=>{
    const recs=files.map(f=>f.items.get(key));
    if(recs.some(r=>!r)) return;                 // must be in ALL
    const offers=recs.map(r=>r.offer);
    if(offers.some(o=>o==null)) return;
    const allEq=offers.every(o=>offersEqual(o,offers[0]));
    if(!allEq) return;
    rows.push({
      "Item No.": meta.itemNo,
      "Product Name": meta.name,
      "Unified Offer %": offers[0],
      "Files Count": files.length,
      "Files Included": files.map(f=>shortName(f.name)).join(", "),
      "Start Date": uniqJoin(recs.flatMap(r=>[...r.startDates])),
      "End Date": uniqJoin(recs.flatMap(r=>[...r.endDates])),
      "Sale Prices Per File": files.map((f,i)=>shortName(f.name)+": "+joinSet(recs[i].salePrices)).join(" | "),
      _stocks: uniqJoin(recs.flatMap(r=>[...r.stocks])),
    });
  });
  return {type:"unified", title:"Unified Same Offer",
    columns:["Item No.","Product Name","Unified Offer %","Files Count","Files Included","Start Date","End Date","Sale Prices Per File"],
    rows, files};
}

/* ---- 2. Common Items (in all, any offer) ---- */
function repCommon(files){
  const keys=allKeys(files);
  const rows=[];
  keys.forEach((meta,key)=>{
    const recs=files.map(f=>f.items.get(key));
    if(recs.some(r=>!r)) return;
    const offers=recs.map(r=>r.offer);
    const unified=offers.every(o=>offersEqual(o,offers[0]));
    rows.push({
      "Item No.": meta.itemNo,
      "Product Name": meta.name,
      "Files Count": files.length,
      ...perFileOfferObj(files,recs),
      "Unified?": unified?"Yes":"No",
      _stocks: uniqJoin(recs.flatMap(r=>[...r.stocks])),
    });
  });
  return {type:"common", title:"Common Items",
    columns:["Item No.","Product Name","Files Count",...files.map(f=>shortName(f.name)+" %"),"Unified?"],
    rows, files};
}

/* ---- 3. Common but Different Offer ---- */
function repDifferent(files){
  const keys=allKeys(files);
  const rows=[];
  keys.forEach((meta,key)=>{
    const recs=files.map(f=>f.items.get(key));
    if(recs.some(r=>!r)) return;
    const offers=recs.map(r=>r.offer);
    if(offers.every(o=>offersEqual(o,offers[0]))) return; // skip unified
    const valid=offers.filter(o=>o!=null);
    const min=Math.min(...valid), max=Math.max(...valid);
    rows.push({
      "Item No.": meta.itemNo,
      "Product Name": meta.name,
      "Files Count": files.length,
      ...perFileOfferObj(files,recs),
      "Difference Summary": `min ${min}% / max ${max}% (Δ${round2(max-min)})`,
      "Sale Price Per File": files.map((f,i)=>shortName(f.name)+": "+joinSet(recs[i].salePrices)).join(" | "),
      "Start Date Per File": files.map((f,i)=>shortName(f.name)+": "+joinSet(recs[i].startDates)).join(" | "),
      "End Date Per File": files.map((f,i)=>shortName(f.name)+": "+joinSet(recs[i].endDates)).join(" | "),
      _stocks: uniqJoin(recs.flatMap(r=>[...r.stocks])),
    });
  });
  return {type:"different", title:"Common, Different Offer",
    columns:["Item No.","Product Name","Files Count",...files.map(f=>shortName(f.name)+" %"),"Difference Summary","Sale Price Per File","Start Date Per File","End Date Per File"],
    rows, files};
}

/* ---- 4. Unique per file ---- */
function repUnique(files){
  const rows=[];
  files.forEach((f,fi)=>{
    f.items.forEach((rec,key)=>{
      const inOthers=files.some((g,gi)=>gi!==fi && g.items.has(key));
      if(inOthers) return;
      rows.push({
        "Source File": shortName(f.name),
        "Item No.": rec.itemNo,
        "Product Name": rec.name,
        "Offer %": rec.offer,
        "Sale Price": joinSet(rec.salePrices),
        "Start Date": joinSet(rec.startDates),
        "End Date": joinSet(rec.endDates),
        _stocks: [...rec.stocks].join(", "),
      });
    });
  });
  return {type:"unique", title:"Unique Items Per File",
    columns:["Source File","Item No.","Product Name","Offer %","Sale Price","Start Date","End Date"],
    rows, files};
}

/* ---- 5. Missing items (in some, not all) ---- */
function repMissing(files){
  const keys=allKeys(files);
  const rows=[];
  keys.forEach((meta,key)=>{
    const present=[], missing=[], recsByFile={};
    files.forEach(f=>{
      const rec=f.items.get(key);
      if(rec){ present.push(f); recsByFile[f.id]=rec; }
      else missing.push(f);
    });
    if(missing.length===0||present.length===0) return; // must be partial
    const offerObj={};
    present.forEach(f=>{ offerObj[shortName(f.name)+" %"]=recsByFile[f.id].offer; });
    rows.push({
      "Item No.": meta.itemNo,
      "Product Name": meta.name,
      "Existing In Files": present.map(f=>shortName(f.name)).join(", "),
      "Missing From Files": missing.map(f=>shortName(f.name)).join(", "),
      "Offer % Per Existing File": present.map(f=>shortName(f.name)+": "+fmtPct(recsByFile[f.id].offer)).join(" | "),
      _present:present.length, _missing:missing.length,
      _stocks: uniqJoin(present.flatMap(f=>[...recsByFile[f.id].stocks])),
    });
  });
  return {type:"missing", title:"Missing Items",
    columns:["Item No.","Product Name","Existing In Files","Missing From Files","Offer % Per Existing File"],
    rows, files};
}

/* ---- 6. Full comparison ---- */
function repFull(files){
  const keys=allKeys(files);
  const rows=[];
  keys.forEach((meta,key)=>{
    const recs=files.map(f=>f.items.get(key));
    const present=files.filter((f,i)=>recs[i]);
    const missing=files.filter((f,i)=>!recs[i]);
    const offers=present.map(f=>f.items.get(key).offer);
    let status, unified="—", notes="";
    if(missing.length===0){
      const allEq=offers.every(o=>offersEqual(o,offers[0]));
      status = allEq ? "Unified" : "Different";
      unified = allEq ? "Yes" : "No";
      if(!allEq){ const v=offers.filter(o=>o!=null); notes=`offers range ${Math.min(...v)}–${Math.max(...v)}%`; }
    } else if(present.length===1){
      status="Unique"; notes="only in "+shortName(present[0].name);
    } else {
      status="Missing"; notes="absent from "+missing.length+" file(s)";
    }
    const row={
      "Item No.": meta.itemNo,
      "Product Name": meta.name,
      "Status": status,
      "Existing In Files": present.map(f=>shortName(f.name)).join(", "),
      "Missing From Files": missing.map(f=>shortName(f.name)).join(", "),
      ...perFileOfferObj(files,recs),
      "Is Unified Offer": unified,
      "Notes": notes,
      _status:status,
    };
    rows.push(row);
  });
  // order: Unified, Different, Missing, Unique
  const ord={Unified:0,Different:1,Missing:2,Unique:3};
  rows.sort((a,b)=>(ord[a._status]-ord[b._status]) || String(a["Item No."]).localeCompare(String(b["Item No."]),undefined,{numeric:true}));
  return {type:"full", title:"Full Comparison",
    columns:["Item No.","Product Name","Status","Existing In Files","Missing From Files",...files.map(f=>shortName(f.name)+" %"),"Is Unified Offer","Notes"],
    rows, files};
}

/* ---- helpers ---- */
function perFileOfferObj(files,recs){
  const o={};
  files.forEach((f,i)=>{ o[shortName(f.name)+" %"] = recs[i]? recs[i].offer : null; });
  return o;
}
function fmtPct(v){ return v==null?"—":v+"%"; }
function joinSet(s){ const a=[...s]; return a.length?a.join(", "):"—"; }
function uniqJoin(arr){ const a=[...new Set(arr)]; return a.length?a.join(", "):""; }

/* ============================================================
   RENDER RESULTS
   ============================================================ */
let sortState={col:null,dir:1};
function renderResult(report, files){
  document.getElementById("resultsCard").style.display="";
  document.getElementById("resTitle").textContent=report.title;
  document.getElementById("resCount").textContent=report.rows.length+" rows";
  sortState={col:null,dir:1};
  document.getElementById("resSearch").value="";
  renderSummary(report,files);
  drawTable(report);
  document.getElementById("resultsCard").scrollIntoView({behavior:"smooth",block:"start"});
}

function renderSummary(report,files){
  const c=document.getElementById("summaryChips");
  let chips=[];
  if(report.type==="full"){
    const by=k=>report.rows.filter(r=>r._status===k).length;
    chips=[["Unified",by("Unified"),"var(--green)"],["Different",by("Different"),"var(--amber)"],["Missing",by("Missing"),"var(--rose)"],["Unique",by("Unique"),"var(--teal)"]];
  } else {
    chips=[[report.title,report.rows.length,"var(--teal)"],["Selected files",files.length,"var(--ink-dim)"]];
  }
  c.innerHTML=chips.map(([l,n,col])=>`<div class="chip"><div class="n" style="color:${col}">${n}</div><div class="l">${l}</div></div>`).join("");
}

function statusBadge(s){
  const m={Unified:"b-green",Different:"b-amber",Missing:"b-rose",Unique:"b-blue"};
  return `<span class="badge ${m[s]||'b-slate'}">${s}</span>`;
}

function drawTable(report){
  const body=document.getElementById("resBody");
  if(!report.rows.length){
    body.innerHTML=`<div class="empty"><div class="ic">∅</div>No items match this report for the selected files.</div>`;
    return;
  }
  const filter=document.getElementById("resSearch").value.trim().toLowerCase();
  let rows=report.rows;
  if(filter){
    rows=rows.filter(r=>report.columns.some(c=>String(r[c]??"").toLowerCase().includes(filter)) || String(r["Product Name"]??"").toLowerCase().includes(filter));
  }
  if(sortState.col!=null){
    const col=sortState.col, dir=sortState.dir;
    rows=[...rows].sort((a,b)=>{
      let x=a[col],y=b[col];
      const nx=parseFloat(x),ny=parseFloat(y);
      if(!isNaN(nx)&&!isNaN(ny)&&String(x).trim()!==""&&String(y).trim()!=="") return (nx-ny)*dir;
      return String(x??"").localeCompare(String(y??""),undefined,{numeric:true})*dir;
    });
  }
  const offerCols=report.files.map(f=>shortName(f.name)+" %");
  let html='<div class="tbl-scroll"><table><thead><tr>';
  report.columns.forEach(c=>{
    const ar=sortState.col===c?(sortState.dir>0?"▲":"▼"):"";
    html+=`<th data-col="${c.replace(/"/g,'&quot;')}">${c}<span class="arrow">${ar}</span></th>`;
  });
  html+='</tr></thead><tbody>';
  rows.forEach(r=>{
    html+='<tr>';
    report.columns.forEach(c=>{
      let v=r[c];
      let cls="", cell;
      if(c==="Status"){ cell=statusBadge(v); }
      else if(c==="Item No."){ cls="num"; cell=v===""||v==null?'<span class="muted">—</span>':v; }
      else if(c==="Product Name"){
        cls="prodname"; const stk=r._stocks;
        cell=`<span dir-auto>${esc(v||"—")}</span>`+(stk?`<div class="stocklist" title="Stock IDs">⛒ ${esc(stk)}</div>`:"");
      }
      else if(c==="Unified?"||c==="Is Unified Offer"){
        cell = v==="Yes"?'<span class="badge b-green">Yes</span>': v==="No"?'<span class="badge b-amber">No</span>': '<span class="muted">—</span>';
      }
      else if(offerCols.includes(c)){
        cls="num offcell"; 
        if(v==null||v===""){ cell='<span class="offcell miss">—</span>'; }
        else cell=v+"%";
      }
      else if(c.includes("Offer %")&&typeof v==="number"){ cls="num"; cell=v+"%"; }
      else if(c==="Unified Offer %"){ cls="num"; cell=`<span class="badge b-green">${v}%</span>`; }
      else { cell=v==null||v===""?'<span class="muted">—</span>':`<span dir-auto>${esc(String(v))}</span>`; }
      html+=`<td class="${cls}">${cell}</td>`;
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  body.innerHTML=html;
  body.querySelectorAll("th").forEach(th=>{
    th.addEventListener("click",()=>{
      const col=th.dataset.col;
      if(sortState.col===col) sortState.dir*=-1; else {sortState.col=col;sortState.dir=1;}
      drawTable(report);
    });
  });
}
function esc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

document.getElementById("resSearch").addEventListener("input",()=>{ if(STATE.lastReport) drawTable(STATE.lastReport); });

/* ============================================================
   EXPORT
   ============================================================ */
function reportToAOA(report){
  const aoa=[report.columns];
  report.rows.forEach(r=>aoa.push(report.columns.map(c=>{
    let v=r[c];
    if(v==null) return "";
    return v;
  })));
  return aoa;
}
function exportWorkbook(reports, fname){
  const wb=XLSX.utils.book_new();
  reports.forEach(rep=>{
    const ws=XLSX.utils.aoa_to_sheet(reportToAOA(rep));
    // column widths
    ws["!cols"]=rep.columns.map(c=>({wch:Math.min(Math.max(c.length+2,12),42)}));
    let sheetName=rep.title.replace(/[\\\/\?\*\[\]:]/g,"").slice(0,31)||"Report";
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
  });
  XLSX.writeFile(wb,fname);
}
document.getElementById("exportCur").addEventListener("click",()=>{
  if(!STATE.lastReport) return;
  exportWorkbook([STATE.lastReport], "offer_report_"+STATE.lastReport.type+".xlsx");
  toast("Exported current report");
});
document.getElementById("exportAll").addEventListener("click",()=>{
  const files=selectedFiles();
  if(files.length<1){ toast("Select files first"); return; }
  const all=[repUnified(files),repCommon(files),repDifferent(files),repUnique(files),repMissing(files),repFull(files)];
  exportWorkbook(all,"offer_all_reports.xlsx");
  toast("Exported all 6 reports");
});

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200);
}

/* init */
renderReports();
</script>
